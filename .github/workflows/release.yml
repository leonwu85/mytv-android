name: Release APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    env:
      KEYSTORE: ${{ github.workspace }}/keystore.jks
      RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        run: |
          missing=0
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error title=Missing signing secret::Set ANDROID_KEYSTORE_BASE64 from the current keystore.jks."
            missing=1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error title=Missing signing secret::Set ANDROID_KEYSTORE_PASSWORD from the current key.properties storePassword."
            missing=1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error title=Missing signing secret::Set ANDROID_KEY_ALIAS from the current key.properties keyAlias."
            missing=1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error title=Missing signing secret::Set ANDROID_KEY_PASSWORD from the current key.properties keyPassword."
            missing=1
          fi
          exit "$missing"

      - name: Decode release keystore
        run: |
          printf "%s" "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/mytv-android-${GITHUB_REF_NAME}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mytv-android-${{ github.ref_name }}
          path: release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*.apk
